<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diário Alimentar">
<title>Diário Alimentar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, 'Inter', system-ui, sans-serif; min-height: 100vh; padding-bottom: 90px; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #1e293b; padding: 52px 16px 12px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: #64748b; margin-top: 2px; }
  nav { display: flex; gap: 4px; margin-top: 12px; }
  nav button { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: #64748b; transition: all 0.15s; }
  nav button.active { background: #6366f1; color: #fff; }

  /* CONTAINER */
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* CARDS */
  .card { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
  .entry-card { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 8px; border: 1px solid #334155; }

  /* FORM ELEMENTS */
  label.lbl { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  input[type="text"], input[type="date"], textarea, select {
    width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px;
    padding: 10px 12px; color: #e2e8f0; font-size: 14px; outline: none;
    font-family: inherit; appearance: none; -webkit-appearance: none;
  }
  textarea { resize: vertical; min-height: 70px; }
  input[type="date"] { color-scheme: dark; }

  .mb14 { margin-bottom: 14px; }

  /* PILL BUTTONS */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 6px 12px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 13px; cursor: pointer; font-weight: 500; font-family: inherit; }
  .pill.active { border-color: #6366f1; background: #6366f122; color: #a5b4fc; }
  .pill.sym { border-radius: 20px; font-size: 12px; }
  .pill.sym.active { border-color: #f59e0b; background: #f59e0b22; color: #fcd34d; }

  /* PAIN BUTTONS */
  .pain-grid { display: flex; gap: 6px; justify-content: space-between; }
  .pain-btn { flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid #334155; background: transparent; cursor: pointer; text-align: center; font-family: inherit; }
  .pain-btn .emoji { font-size: 18px; display: block; }
  .pain-btn .plabel { font-size: 9px; font-weight: 600; color: #64748b; margin-top: 2px; display: block; line-height: 1.2; }

  /* SUBMIT */
  .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: inherit; }
  .btn-cancel { width: 100%; padding: 12px; background: transparent; border: 1px solid #334155; border-radius: 12px; color: #64748b; font-size: 14px; cursor: pointer; margin-top: 8px; font-family: inherit; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: #fff; font-size: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,0.5); display: flex; align-items: center; justify-content: center; z-index: 20; line-height: 1; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 30; overflow-y: auto; padding: 20px 16px 60px; display: none; }
  .modal-overlay.open { display: block; }
  .modal-box { background: #1e293b; border-radius: 20px; padding: 20px; max-width: 480px; margin: 0 auto; border: 1px solid #334155; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .btn-close { background: none; border: none; color: #64748b; font-size: 26px; cursor: pointer; line-height: 1; padding: 0; }

  /* TAGS */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
  .tag-purple { background: #6366f122; color: #a5b4fc; }
  .tag-yellow { background: #f59e0b22; color: #fcd34d; }

  /* PAIN DOT */
  .pain-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* ENTRY META */
  .entry-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .entry-actions { display: flex; gap: 8px; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 15px; padding: 2px; }
  .entry-text { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  .entry-text-lbl { color: #64748b; font-size: 11px; font-weight: 600; }
  .entry-notes { font-size: 12px; color: #475569; margin-top: 4px; font-style: italic; }

  /* SECTION TITLE */
  .section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  /* STAT CARD */
  .stat-card { background: #1e293b; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
  .stat-num { font-size: 28px; font-weight: 800; color: #6366f1; }
  .stat-lbl { font-size: 13px; color: #64748b; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: #475569; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  /* DATE GROUP */
  .date-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; margin-top: 16px; }
  .date-label { font-size: 13px; font-weight: 700; color: #94a3b8; }

  /* CONFIRM DELETE */
  .confirm-del { display: flex; gap: 4px; }
  .btn-del-confirm { background: #f87171; border: none; color: #fff; border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn-del-cancel { background: #334155; border: none; color: #94a3b8; border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 12px; font-family: inherit; }

  /* PAIN BAR */
  .pain-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .pain-bar-bg { width: 80px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
  .pain-bar-fill { height: 100%; border-radius: 3px; }
  .pain-bar-val { font-size: 12px; font-weight: 700; }

  /* FOOD PAIN ROW */
  .food-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
  .food-row:last-child { border-bottom: none; }
  .food-name { font-weight: 600; color: #e2e8f0; text-transform: capitalize; }
  .food-count { font-size: 12px; color: #64748b; margin-left: 6px; }

  .date-subline { display: flex; align-items: center; gap: 6px; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 50; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🫀 Diário Alimentar</h1>
  <p id="saving-indicator">Rastreamento de alimentos e sintomas abdominais</p>
  <nav>
    <button class="active" onclick="setView('hoje')">Hoje</button>
    <button onclick="setView('historico')">Histórico</button>
    <button onclick="setView('analise')">Análise</button>
  </nav>
</div>

<div class="container" id="main-content"></div>

<button class="fab" onclick="openForm()">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Nova refeição</h2>
      <button class="btn-close" onclick="closeForm()">×</button>
    </div>

    <div class="mb14">
      <label class="lbl">Data</label>
      <input type="date" id="f-date">
    </div>
    <div class="mb14">
      <label class="lbl">Refeição</label>
      <div class="pills" id="meal-btns"></div>
    </div>
    <div class="mb14">
      <label class="lbl">O que você comeu?</label>
      <textarea id="f-foods" placeholder="Ex: arroz, feijão, frango grelhado, suco de laranja..."></textarea>
    </div>
    <div class="mb14">
      <label class="lbl">Evitou / deixou de comer (opcional)</label>
      <input type="text" id="f-avoided" placeholder="Ex: leite, frituras, glúten...">
    </div>
    <div class="mb14">
      <label class="lbl">Nível de dor / desconforto</label>
      <div class="pain-grid" id="pain-btns"></div>
    </div>
    <div class="mb14" id="pain-time-wrap" style="display:none">
      <label class="lbl">Quando sentiu a dor?</label>
      <div class="pills" id="pain-time-btns"></div>
    </div>
    <div class="mb14">
      <label class="lbl">Sintomas (opcional)</label>
      <div class="pills" id="symptom-btns"></div>
    </div>
    <div class="mb14">
      <label class="lbl">Observações (opcional)</label>
      <textarea id="f-notes" placeholder="Algo relevante sobre o dia, estresse, horário de sono..." style="min-height:54px"></textarea>
    </div>

    <button class="btn-submit" onclick="handleSubmit()" id="btn-submit-lbl">✅ Registrar refeição</button>
    <button class="btn-cancel" onclick="closeForm()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast">Salvo!</div>

<script>
const PAIN_LEVELS = [
  { value: 0, label: "Sem dor", emoji: "😊", color: "#4ade80" },
  { value: 1, label: "Leve", emoji: "😐", color: "#a3e635" },
  { value: 2, label: "Moderada", emoji: "😕", color: "#facc15" },
  { value: 3, label: "Intensa", emoji: "😣", color: "#fb923c" },
  { value: 4, label: "Muito intensa", emoji: "😫", color: "#f87171" },
];
const MEAL_TYPES = ["Café da manhã", "Almoço", "Jantar", "Lanche"];
const PAIN_TIMES = [["before","Antes"],["during","Durante"],["after","Depois"],["later","Horas depois"]];
const SYMPTOMS = ["Inchaço","Gases","Azia","Náusea","Cólica","Diarreia","Constipação","Queimação","Pressão","Vômito"];

let entries = {};
let currentView = "hoje";
let editId = null;
let formPain = 0;
let formMeal = "Almoço";
let formPainTime = "during";
let formSymptoms = [];
let confirmingDelete = null;

function todayKey() {
  return new Date().toISOString().split("T")[0];
}

function formatDate(d) {
  const date = new Date(d + "T12:00:00");
  return date.toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "2-digit" });
}

function loadData() {
  try {
    const raw = localStorage.getItem("food-diary-entries");
    if (raw) entries = JSON.parse(raw);
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem("food-diary-entries", JSON.stringify(entries));
    showToast("Salvo!");
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function setView(v) {
  currentView = v;
  document.querySelectorAll("nav button").forEach((b, i) => {
    b.classList.toggle("active", ["hoje","historico","analise"][i] === v);
  });
  render();
}

function render() {
  const c = document.getElementById("main-content");
  if (currentView === "hoje") c.innerHTML = renderHoje();
  else if (currentView === "historico") c.innerHTML = renderHistorico();
  else c.innerHTML = renderAnalise();
}

function renderHoje() {
  const today = todayKey();
  const todayEntries = entries[today] || [];
  const dateStr = new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" });
  let html = `<p style="color:#94a3b8;font-size:14px;margin-bottom:16px">${dateStr}</p>`;
  if (todayEntries.length === 0) {
    html += `<div class="empty"><div class="icon">🍽️</div><p style="font-weight:600;color:#64748b;margin-bottom:6px">Nenhuma refeição registrada hoje</p><p>Toque no + para adicionar</p></div>`;
  } else {
    todayEntries.forEach(e => { html += renderEntry(e); });
  }
  return html;
}

function renderHistorico() {
  const allDates = Object.keys(entries).sort((a,b) => b.localeCompare(a));
  let html = `<div class="mb14"><label class="lbl">Filtrar por data</label><input type="date" id="hist-date" value="${todayKey()}" onchange="renderHistByDate(this.value)"></div>`;
  if (allDates.length === 0) {
    html += `<div class="empty"><div class="icon">📋</div><p style="color:#64748b">Nenhum registro ainda</p></div>`;
    return html;
  }
  allDates.forEach(date => {
    const dayEntries = entries[date] || [];
    if (dayEntries.length === 0) return;
    const maxPain = Math.max(...dayEntries.map(e => e.painLevel));
    const painColor = PAIN_LEVELS[maxPain].color;
    html += `<div class="date-header">
      <span class="date-label">${formatDate(date)}</span>
      <span class="pain-dot" style="background:${painColor}"></span>
      <span style="font-size:12px;color:${painColor}">${PAIN_LEVELS[maxPain].label}</span>
    </div>`;
    dayEntries.forEach(e => { html += renderEntry(e); });
  });
  return html;
}

function renderEntry(e) {
  const pain = PAIN_LEVELS[e.painLevel];
  const sympHtml = (e.symptoms||[]).map(s => `<span class="tag tag-yellow">${s}</span>`).join("");
  return `<div class="entry-card">
    <div class="entry-meta">
      <div>
        <span style="font-weight:700;font-size:14px;color:#e2e8f0">${e.mealType}</span>
        <span class="tag tag-purple" style="margin-left:8px">${pain.emoji} ${pain.label}</span>
      </div>
      <div class="entry-actions">
        <button class="btn-icon" onclick="openEditForm('${e.date}','${e.id}')">✏️</button>
        <button class="btn-icon" onclick="askDelete('${e.date}','${e.id}')" id="del-btn-${e.id}">🗑️</button>
        <span id="del-confirm-${e.id}" style="display:none" class="confirm-del">
          <button class="btn-del-confirm" onclick="confirmDelete('${e.date}','${e.id}')">Apagar</button>
          <button class="btn-del-cancel" onclick="cancelDelete('${e.id}')">Não</button>
        </span>
      </div>
    </div>
    ${e.foods ? `<p class="entry-text"><span class="entry-text-lbl">COMEU · </span>${e.foods}</p>` : ""}
    ${e.avoided ? `<p class="entry-text"><span class="entry-text-lbl">EVITOU · </span>${e.avoided}</p>` : ""}
    ${sympHtml ? `<div style="margin-top:6px">${sympHtml}</div>` : ""}
    ${e.notes ? `<p class="entry-notes">${e.notes}</p>` : ""}
  </div>`;
}

function askDelete(date, id) {
  document.getElementById("del-btn-" + id).style.display = "none";
  document.getElementById("del-confirm-" + id).style.display = "flex";
}
function cancelDelete(id) {
  document.getElementById("del-btn-" + id).style.display = "inline";
  document.getElementById("del-confirm-" + id).style.display = "none";
}
function confirmDelete(date, id) {
  entries[date] = (entries[date] || []).filter(e => e.id !== id);
  saveData();
  render();
}

function renderAnalise() {
  const allEntries = Object.values(entries).flat();
  const allDates = Object.keys(entries).filter(d => (entries[d]||[]).length > 0);
  const avgPain = allEntries.length
    ? (allEntries.reduce((s,e) => s + e.painLevel, 0) / allEntries.length).toFixed(1)
    : null;

  // --- Alimentos comidos x dor ---
  const foodPainMap = {};
  allEntries.forEach(e => {
    if (!e.foods) return;
    e.foods.split(/[,;\n]/).forEach(f => {
      const name = f.trim().toLowerCase();
      if (!name) return;
      if (!foodPainMap[name]) foodPainMap[name] = { total: 0, count: 0 };
      foodPainMap[name].total += e.painLevel;
      foodPainMap[name].count++;
    });
  });
  const topFoods = Object.entries(foodPainMap)
    .filter(([,v]) => v.count >= 2)
    .map(([name,v]) => ({ name, avg: v.total/v.count, count: v.count }))
    .sort((a,b) => b.avg - a.avg).slice(0,5);

  // --- Alimentos evitados x dor ---
  // Para cada alimento evitado, registra a dor naquele dia/refeição
  const avoidedPainMap = {};
  allEntries.forEach(e => {
    if (!e.avoided) return;
    e.avoided.split(/[,;\n]/).forEach(f => {
      const name = f.trim().toLowerCase();
      if (!name) return;
      if (!avoidedPainMap[name]) avoidedPainMap[name] = { total: 0, count: 0, semDor: 0 };
      avoidedPainMap[name].total += e.painLevel;
      avoidedPainMap[name].count++;
      if (e.painLevel === 0) avoidedPainMap[name].semDor++;
    });
  });
  // Ordenar por maior frequência de ausência de dor ao evitar
  const topAvoided = Object.entries(avoidedPainMap)
    .filter(([,v]) => v.count >= 2)
    .map(([name,v]) => ({ name, avg: v.total/v.count, count: v.count, semDor: v.semDor, pctSemDor: Math.round((v.semDor/v.count)*100) }))
    .sort((a,b) => b.pctSemDor - a.pctSemDor || a.avg - b.avg)
    .slice(0,5);

  const sympMap = {};
  allEntries.forEach(e => (e.symptoms||[]).forEach(s => { sympMap[s] = (sympMap[s]||0)+1; }));
  const sortedSymp = Object.entries(sympMap).sort((a,b) => b[1]-a[1]);

  const avgColor = avgPain >= 2 ? "#f87171" : "#4ade80";

  let html = `<p class="section-title">Resumo geral</p>
  <div class="stat-card"><div style="font-size:32px">📊</div><div><div class="stat-num">${allEntries.length}</div><div class="stat-lbl">refeições registradas</div></div></div>
  <div class="stat-card"><div style="font-size:32px">😣</div><div><div class="stat-num" style="color:${avgColor}">${avgPain ?? "—"}</div><div class="stat-lbl">dor média (0–4)</div></div></div>
  <div class="stat-card"><div style="font-size:32px">📅</div><div><div class="stat-num">${allDates.length}</div><div class="stat-lbl">dias registrados</div></div></div>`;

  // Seção: alimentos comidos com mais dor
  if (topFoods.length > 0) {
    html += `<p class="section-title" style="margin-top:20px">⚠️ Comidos com mais dor (2+ registros)</p><div class="card">`;
    topFoods.forEach(f => {
      const pct = (f.avg/4)*100;
      const color = f.avg >= 3 ? "#f87171" : f.avg >= 2 ? "#fb923c" : f.avg >= 1 ? "#facc15" : "#4ade80";
      html += `<div class="food-row">
        <div><span class="food-name">${f.name}</span><span class="food-count">(${f.count}x)</span></div>
        <div class="pain-bar-wrap">
          <div class="pain-bar-bg"><div class="pain-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="pain-bar-val" style="color:${color}">${f.avg.toFixed(1)}</span>
        </div>
      </div>`;
    });
    html += `<p style="font-size:11px;color:#475569;margin-top:10px">Dor média de 0 a 4 nos dias em que consumiu.</p></div>`;
  }

  // Seção: alimentos evitados com menos dor (insight principal novo)
  if (topAvoided.length > 0) {
    html += `<p class="section-title" style="margin-top:20px">✅ Evitados e sem dor (suspeitos de causar)</p><div class="card">`;
    topAvoided.forEach(f => {
      const barColor = f.pctSemDor >= 70 ? "#4ade80" : f.pctSemDor >= 40 ? "#facc15" : "#fb923c";
      html += `<div class="food-row">
        <div>
          <span class="food-name">${f.name}</span><span class="food-count">(${f.count}x evitado)</span>
          <div style="font-size:11px;color:#64748b;margin-top:2px">Sem dor em ${f.semDor} de ${f.count} vezes</div>
        </div>
        <div class="pain-bar-wrap">
          <div class="pain-bar-bg"><div class="pain-bar-fill" style="width:${f.pctSemDor}%;background:${barColor}"></div></div>
          <span class="pain-bar-val" style="color:${barColor}">${f.pctSemDor}%</span>
        </div>
      </div>`;
    });
    html += `<p style="font-size:11px;color:#475569;margin-top:10px">% de vezes que evitou esse alimento e <strong>não</strong> sentiu dor. Quanto maior, mais suspeito.</p></div>`;
  }

  if (sortedSymp.length > 0) {
    html += `<p class="section-title" style="margin-top:20px">🩺 Sintomas mais frequentes</p><div class="card"><div class="pills">`;
    sortedSymp.forEach(([s,c]) => { html += `<span class="tag tag-yellow">${s} · ${c}x</span>`; });
    html += `</div></div>`;
  }

  if (allEntries.length === 0) {
    html += `<div class="empty"><div class="icon">🔍</div><p style="color:#64748b;font-weight:600;margin-bottom:6px">Dados insuficientes</p><p>Registre pelo menos 2 semanas para ver padrões de correlação.</p></div>`;
  }
  return html;
}

// FORM
function buildFormUI() {
  // Meal buttons
  const mb = document.getElementById("meal-btns");
  mb.innerHTML = MEAL_TYPES.map(m =>
    `<button class="pill${formMeal===m?' active':''}" onclick="setMeal('${m}')">${m}</button>`
  ).join("");

  // Pain buttons
  const pb = document.getElementById("pain-btns");
  pb.innerHTML = PAIN_LEVELS.map(p =>
    `<button class="pain-btn" id="pbtn-${p.value}" onclick="setPain(${p.value})" style="border-color:${formPain===p.value?p.color:'#334155'};background:${formPain===p.value?p.color+'22':'transparent'}">
      <span class="emoji">${p.emoji}</span>
      <span class="plabel" style="color:${formPain===p.value?p.color:'#64748b'}">${p.label}</span>
    </button>`
  ).join("");

  // Pain time
  const ptw = document.getElementById("pain-time-wrap");
  ptw.style.display = formPain > 0 ? "block" : "none";
  const ptb = document.getElementById("pain-time-btns");
  ptb.innerHTML = PAIN_TIMES.map(([v,l]) =>
    `<button class="pill${formPainTime===v?' active':''}" onclick="setPainTime('${v}')">${l}</button>`
  ).join("");

  // Symptoms
  const sb = document.getElementById("symptom-btns");
  sb.innerHTML = SYMPTOMS.map(s =>
    `<button class="pill sym${formSymptoms.includes(s)?' active':''}" onclick="toggleSymptom('${s}')">${s}</button>`
  ).join("");
}

function setMeal(m) { formMeal = m; buildFormUI(); }
function setPain(v) { formPain = v; buildFormUI(); }
function setPainTime(v) { formPainTime = v; buildFormUI(); }
function toggleSymptom(s) {
  formSymptoms = formSymptoms.includes(s) ? formSymptoms.filter(x=>x!==s) : [...formSymptoms, s];
  buildFormUI();
}

function openForm() {
  editId = null;
  formPain = 0; formMeal = "Almoço"; formPainTime = "during"; formSymptoms = [];
  document.getElementById("f-date").value = todayKey();
  document.getElementById("f-foods").value = "";
  document.getElementById("f-avoided").value = "";
  document.getElementById("f-notes").value = "";
  document.getElementById("modal-title").textContent = "Nova refeição";
  document.getElementById("btn-submit-lbl").textContent = "✅ Registrar refeição";
  buildFormUI();
  document.getElementById("modal").classList.add("open");
}

function openEditForm(date, id) {
  const entry = (entries[date]||[]).find(e => e.id === id);
  if (!entry) return;
  editId = id;
  formMeal = entry.mealType;
  formPain = entry.painLevel;
  formPainTime = entry.painTime || "during";
  formSymptoms = entry.symptoms || [];
  document.getElementById("f-date").value = entry.date;
  document.getElementById("f-foods").value = entry.foods || "";
  document.getElementById("f-avoided").value = entry.avoided || "";
  document.getElementById("f-notes").value = entry.notes || "";
  document.getElementById("modal-title").textContent = "Editar registro";
  document.getElementById("btn-submit-lbl").textContent = "💾 Salvar alterações";
  buildFormUI();
  document.getElementById("modal").classList.add("open");
}

function closeForm() {
  document.getElementById("modal").classList.remove("open");
}

function handleSubmit() {
  const foods = document.getElementById("f-foods").value.trim();
  const avoided = document.getElementById("f-avoided").value.trim();
  const date = document.getElementById("f-date").value;
  const notes = document.getElementById("f-notes").value.trim();
  if (!foods && !avoided) { alert("Preencha pelo menos o que comeu ou o que evitou."); return; }

  const entry = {
    id: editId || Date.now().toString(),
    date, mealType: formMeal, foods, avoided,
    painLevel: formPain, painTime: formPainTime,
    symptoms: formSymptoms, notes,
    createdAt: new Date().toISOString()
  };

  const dayEntries = entries[date] || [];
  if (editId) {
    entries[date] = dayEntries.map(e => e.id === editId ? entry : e);
  } else {
    entries[date] = [...dayEntries, entry];
  }

  saveData();
  closeForm();
  render();
}

// INIT
loadData();
render();
</script>
</body>
</html>
